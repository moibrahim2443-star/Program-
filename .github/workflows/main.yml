name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip build-essential git python3-setuptools libffi-dev ssl-cert
          # تثبيت Cython و Buildozer
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # تشغيل البناء مع المسار الصحيح
          yes | /home/runner/.local/bin/buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Android-App
          path: bin/*.apk
